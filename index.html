<!DOCTYPE html>
<html lang="en">
<head>

    <title>Checkers Game - Arnav Kashyap & Arbaaz Pathan</title>
    <script src="script1.js" defer></script>
    <script src="script2.js" defer></script>
    <script src="script3.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #e8f0fe;
            margin-top: 20px;
        }
        h1 {
            color: #222;
        }
        canvas {
            border: 4px solid #555;
            margin-top: 20px;
            background: linear-gradient(45deg, #f5f5f5, #ddd);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: #555;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover {
            background-color: #333;
        }
    </style>

<body>
    <h1>Checkers Game</h1>
    <h3>Group Members: Arnav Kashyap and Arbaaz Pathan</h3>

    <canvas id="board" width="800" height="800"></canvas>
